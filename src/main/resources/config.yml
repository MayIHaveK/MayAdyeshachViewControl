# MayAdyeshachViewControl 配置文件
# NPC 私有化控制 + 交互 HUD

# ============================================================
# 进服自动隐藏的 NPC 列表
# 这些 NPC 默认对所有玩家隐藏，需要通过指令授权才能看见
# 填写 Adyeshach NPC 的 ID（不是 customName）
# ============================================================
auto-hide-npcs:
  # - "npc_secret_shop"
  # - "npc_vip_only"

# ============================================================
# 隐藏组定义
# 可以将多个 NPC 归为一组，通过 /madvc group 命令批量操作
# ============================================================
groups:
  # 示例：VIP 专属 NPC 组
  # vip_npcs:
  #   - "npc_vip_1"
  #   - "npc_vip_2"
  #   - "npc_vip_3"

  # 示例：活动 NPC 组
  # event_npcs:
  #   - "npc_event_a"
  #   - "npc_event_b"

# ============================================================
# 交互 HUD 配置
# 需要安装 ArcartX 客户端 mod 前置
# 功能：靠近实体/NPC 时在屏幕上显示可交互列表
#       玩家通过上下键选择，按 F 键触发交互（模拟右键点击实体）
# 私有 NPC 兼容：被 removeViewer 隐藏的 NPC 不会出现在列表中
# 列表按距离排序，最近的实体显示在最上方
# ============================================================
interact:
  # 是否启用交互 HUD（需要服务端安装 ArcartX 插件）
  enabled: false

  # 交互检测距离（方块），以玩家为圆心的半径
  distance: 2.5

  # 扫描周期（tick，20tick = 1秒）
  # 插件每隔这么多 tick 扫描一次玩家附近的实体
  # 值越小越灵敏，但越耗性能，建议 2~5
  scan-period: 2

  # 发包周期（tick）
  # 每隔这么多 tick 向客户端推送一次 HUD 数据
  # 建议 3~10，太小会增加网络开销
  packet-period: 3

  # Bukkit 原生实体名称匹配列表
  # 只有 customName 或 name 在此列表中的实体才会显示
  # 留空 = 不显示任何 Bukkit 原生实体
  match-names: []
    # - "商店老板"
    # - "铁匠"

  # Adyeshach NPC 匹配列表
  # 同时匹配 ID 和 customName（中文名），填哪个都行
  # 留空 = 显示距离内所有对该玩家可见的 NPC
  match-ady-ids: []
    # - "npc_shop"
    # - "小火龙"

  # ============================================================
  # 世界白名单（性能优化）
  # 只在列表中的世界启用交互 HUD 扫描
  # 留空 = 所有世界都启用
  # 推荐：只填有 NPC 的世界，可以大幅减少不必要的扫描开销
  # ============================================================
  allowed-worlds: []
    # - "world"
    # - "world_nether"

  # ============================================================
  # ArcartX 区域白名单（性能优化）
  # 只在玩家处于列表中的 ArcartX 区域内时启用交互 HUD
  # 留空 = 所有区域都启用（包括不在任何区域内）
  # 推荐：配合 ArcartX 区域划定 NPC 活动范围，精确控制 HUD 显示
  #       可以避免玩家在野外时也触发扫描，显著提升性能
  # ============================================================
  allowed-areas: []
    # - "spawn_area"
    # - "npc_zone"

  # 调试模式（在控制台输出扫描和发包日志）
  debug: false
