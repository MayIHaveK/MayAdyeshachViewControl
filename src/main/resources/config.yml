# MayAdyeshachViewControl 配置文件
# NPC 私有化控制

# ============================================================
# 进服自动隐藏的 NPC 列表
# 这些 NPC 默认对所有玩家隐藏，需要通过指令授权才能看见
# ============================================================
auto-hide-npcs:
  # - "npc_secret_shop"
  # - "npc_vip_only"

# ============================================================
# 隐藏组定义
# 可以将多个 NPC 归为一组，通过 /madvc group 命令批量操作
# ============================================================
groups:
  # 示例：VIP 专属 NPC 组
  # vip_npcs:
  #   - "npc_vip_1"
  #   - "npc_vip_2"
  #   - "npc_vip_3"
  
  # 示例：活动 NPC 组
  # event_npcs:
  #   - "npc_event_a"
  #   - "npc_event_b"
